[package]
name = "wiki"
version = "0.1.0"
edition = "2021"
rust-version = "1.85"
description = "Karpathy-style LLM Wiki, markdown-only, with NVIDIA NIM embeddings"
license = "Apache-2.0"
repository = "https://github.com/fg/wiki"

[[bin]]
name = "wiki"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
serde_json = "1"
pulldown-cmark = "0.12"
notify = "6"
walkdir = "2"
anyhow = "1"
thiserror = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
indicatif = "0.17"
schemars = "0.8"
regex = "1.12.4"
toml = "0.8"
serde-toml-merge = "0.2"
sha2 = "0.11.0"
chrono = "0.4.45"
hex = "0.4"

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
tempfile = "3"
insta = "1"
wiremock = "0.6"

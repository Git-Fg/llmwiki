# cargo-deny config: licenses + bans + advisories + sources.
# Run locally with: cargo deny check
# CI gate deferred to v0.3.36 (would add ~30s per job for binary download).

[graph]
all-features = false

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "ISC",
    "CC0-1.0",
    "Unicode-3.0",
    # CDLA-Permissive-2.0 is used by webpki-root-certs (transitive via
    # rustls-platform-verifier → reqwest). It's a permissive Linux
    # Foundation license, functionally equivalent to MIT.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = [
    { name = "serde_yaml", version = "*", reason = "archived crate; migrated to serde-saphyr in v0.3.35" },
]

[advisories]
version = 2
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    "https://github.com/Git-Fg/llmwiki",
]
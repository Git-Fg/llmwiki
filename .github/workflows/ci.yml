name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt-clippy-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  marketplace-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate skill format
        run: python marketplace/scripts/validate.py --strict

  skill-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - name: Run skill smoke test
        run: bash tests/skill_smoke.sh

  # Verify the project resolves and typechecks with the declared MSRV.
  # Catches the scenario where a Dependabot dep bump (e.g. via
  # `cargo update` of a transitive like `reqwest`) raises its required
  # rust-version above our Cargo.toml `rust-version` /
  # rust-toolchain.toml channel, which would silently break every
  # downstream user on the documented MSRV. The bump of `rust-version`
  # to 1.88 in v0.3.16 was triggered by exactly this scenario
  # (`darling@0.23.0` requires rustc 1.88).
  # Post-v0.3.20: `Cargo.lock` is tracked (un-ignored), so we'd like
  # to use `--locked` for hermetic verification — but cargo's lockfile
  # is platform-specific (it pins e.g. `windows-sys` to a Linux target
  # that doesn't exist on macOS and vice versa). The lockfile generated
  # on the macOS dev box fails `--locked` on the Linux CI runner, so
  # we run without `--locked` and accept that msrv-check verifies
  # **resolution + typecheck** under rustc 1.88, not exact dep
  # reproducibility. A future improvement is to generate the lockfile
  # in a Linux container (e.g. via `cargo` in a `rust:1.88` Docker
  # step) and commit that one.
  msrv-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
      # `--locked` re-enabled in v0.3.23. The v0.3.22 lockfile-update
      # workflow (run #28054735840) confirmed that regenerating
      # Cargo.lock on a Linux runner produces a lockfile byte-identical
      # to the macOS-committed one (`git rev-list --right-only --count`
      # returned 0), so the platform-specific lockfile divergence the
      # v0.3.21 workaround addressed does not actually apply to the
      # current dep graph. If a future Dependabot PR introduces a dep
      # with genuine platform-specific entries, `--locked` will break
      # again and we'll fall back to the no-`--locked` workaround.
      - run: cargo check --all-targets --locked

  # Asserts CHANGELOG.md has a `## [X.Y.Z] - YYYY-MM-DD` heading matching
  # Cargo.toml's current `version`. Prevents the v0.3.18-class mistake
  # of shipping a release with a CHANGELOG that contradicts the actual
  # job definition.
  changelog-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify CHANGELOG has current version heading
        run: bash tests/changelog_check.sh
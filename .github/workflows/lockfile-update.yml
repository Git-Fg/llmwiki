name: lockfile-update

# Regenerates Cargo.lock on a Linux runner and opens a PR if it
# diverges from main. The lockfile is regenerated to its latest
# compatible versions weekly so the tracked Cargo.lock always
# reflects the upstream index state and resolves cleanly under
# `--locked` on the CI runner. As of v0.3.23, manual runs have
# shown zero divergence between macOS and Linux regeneration, so
# this is mostly an "always-fresh" automation — but the workflow
# exists so any future platform-specific drift is caught by a
# short-lived PR instead of a CI outage.

on:
  schedule:
    # Mondays at 06:17 UTC — early in the week, before Dependabot's
    # typical Tuesday/Wednesday runs. Minute 17 to avoid GitHub
    # Actions' top-of-hour contention.
    - cron: "17 6 * * 1"
  workflow_dispatch: # manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate-lockfile:
    runs-on: ubuntu-latest
    steps:
      # v0.3.23: bumped actions/checkout v4 → v5 (Node 24 native, fixes
      # the "Node 20 deprecated" warning seen in run #28054735840).
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.88
      - name: Regenerate Cargo.lock on Linux
        run: |
          # `cargo update --workspace` rewrites every entry in Cargo.lock
          # to its latest compatible version.
          cargo update --workspace
      # v0.3.23 (M3 from self-critic): verify the regenerated lockfile
      # actually compiles before opening a PR. Without this, a
      # `cargo update` that introduces a dep graph that fails to build
      # under rustc 1.88 would open a broken PR, requiring manual
      # revert by a maintainer. Failing here keeps the workflow
      # self-correcting: the regen attempt still runs weekly, and
      # if a bad dep lands, the PR-opener simply doesn't fire.
      - name: Verify regenerated lockfile compiles under MSRV
        run: cargo check --all-targets --locked
      - name: Show diff stats (for the PR body)
        run: git diff --stat HEAD -- Cargo.lock
      # v0.3.23: bumped peter-evans/create-pull-request v6 → v8.1.1
      # (Node 24 native, fixes the same Node 20 warning).
      - name: Open PR if lockfile changed
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          branch: lockfile-update
          title: "chore(deps): regenerate Cargo.lock on Linux"
          commit-message: "Regenerate Cargo.lock on Linux"
          body: |
            Auto-regenerated by `.github/workflows/lockfile-update.yml`.

            This PR updates `Cargo.lock` to its latest compatible versions
            on a Linux runner.

            The `msrv-check` job has been running with `--locked` since
            v0.3.23 — the previous v0.3.21 workaround (no `--locked`) is
            no longer needed because manual runs of this workflow have
            shown zero net divergence between macOS and Linux regeneration
            of the current dep graph (see workflow run #28054735840 and
            `CHANGELOG.md` for v0.3.23).

            If the regenerated lockfile fails `cargo check --all-targets
            --locked` under rustc 1.88, this workflow will refuse to open
            this PR — the lockfile change will sit in the workflow run's
            artifacts for review instead.

            See `CHANGELOG.md` entries for v0.3.20, v0.3.21, and v0.3.23
            for the full context.
          add-paths: Cargo.lock
          delete-branch: false

name: lockfile-update

# Regenerates Cargo.lock on a Linux runner and opens a PR if it
# diverges from main. The lockfile is platform-specific (cargo pins
# e.g. windows-sys to a Linux target that doesn't exist on macOS dev
# boxes), so the version committed by the macOS dev fails `--locked`
# on the Linux CI runner (v0.3.21 finding). Running this weekly on
# Linux ensures the tracked lock is the one Linux CI actually accepts.

on:
  schedule:
    # Mondays at 06:00 UTC — early in the week, before Dependabot's
    # typical Tuesday/Wednesday runs.
    - cron: "0 6 * * 1"
  workflow_dispatch: # manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate-lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88
      - name: Regenerate Cargo.lock on Linux
        run: |
          # `cargo update --workspace` rewrites every entry in Cargo.lock
          # to its latest compatible version. This forces the platform-
          # specific entries (e.g. windows-sys variants) to be resolved
          # for the Linux target, producing a lockfile that the CI Linux
          # runner will accept via `cargo check --locked`.
          cargo update --workspace
      - name: Show diff stats (for the PR body)
        run: git diff --stat HEAD -- Cargo.lock
      - name: Open PR if lockfile changed
        uses: peter-evans/create-pull-request@v6
        with:
          branch: lockfile-update
          title: "chore(deps): regenerate Cargo.lock on Linux"
          commit-message: "Regenerate Cargo.lock on Linux"
          body: |
            Auto-regenerated by `.github/workflows/lockfile-update.yml`.

            This PR updates `Cargo.lock` to its latest compatible versions
            on a Linux runner. The lockfile is platform-specific (cargo
            pins e.g. `windows-sys` to a Linux target that doesn't exist
            on macOS dev boxes), so the lock committed from a macOS dev
            environment fails `cargo check --locked` on the Linux CI
            runner.

            The `msrv-check` job has been running without `--locked` since
            v0.3.21 because of this. Once this PR is merged, we can
            re-enable `--locked` for fully hermetic MSRV verification.

            See `CHANGELOG.md` entries for v0.3.20 and v0.3.21 for the
            full context.
          add-paths: Cargo.lock
          delete-branch: false

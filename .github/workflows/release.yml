name: release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: build-${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
          - aarch64-unknown-linux-musl
          - x86_64-unknown-linux-musl
          - x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: cargo build --release --locked --target ${{ matrix.target }} --bin llmwiki-cli
      - name: Render owner placeholders in install scripts
        run: |
          sed "s|<owner>|${{ github.repository_owner }}|g" install.sh > install.sh.rendered
          sed "s|<owner>|${{ github.repository_owner }}|g" install.ps1 > install.ps1.rendered
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          if [[ "${{ matrix.target }}" == *-pc-windows-msvc ]]; then
            sudo apt-get install -y zip
            zip ../../../llmwiki-cli-${{ matrix.target }}.zip llmwiki-cli.exe
            sha256sum llmwiki-cli-${{ matrix.target }}.zip > llmwiki-cli-${{ matrix.target }}.zip.sha256
          else
            tar czf ../../../llmwiki-cli-${{ matrix.target }}.tar.gz llmwiki-cli
            sha256sum llmwiki-cli-${{ matrix.target }}.tar.gz > llmwiki-cli-${{ matrix.target }}.tar.gz.sha256
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            llmwiki-cli-${{ matrix.target }}.${{ matrix.target == 'x86_64-pc-windows-msvc' && 'zip' || 'tar.gz' }}
            llmwiki-cli-${{ matrix.target }}.${{ matrix.target == 'x86_64-pc-windows-msvc' && 'zip' || 'tar.gz' }}.sha256
            install.sh.rendered
            install.ps1.rendered